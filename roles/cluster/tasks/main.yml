- name: Stop Redis service
  systemd:
    name: redis-server
    state: stopped

- name: Disable Redis service
  systemd:
    name: redis-server
    enabled: false

- name: Create disable-thp.service
  template:
    src: disable-thp.service.j2
    dest: "/etc/systemd/system/disable-thp.service"
    owner: root
    group: root
  notify: reload systemd

- name: Enable and start disable-thp service
  systemd:
    name: disable-thp
    enabled: true
    state: started

- name: Create 99-redis.conf
  template:
    src: 99-redis.conf.j2
    dest: "/etc/sysctl.d/99-redis.conf"
    owner: root
    group: root

- name: Reload sysctl
  command: sysctl --system
  changed_when: false

- name: Check DATA Disk
  command: lsblk
  register: redis_disk
  changed_when: false

- name: Display DATA Disk
  debug:
    msg: "{{ redis_disk.stdout }}"

- name: Check mount point
  command: df -h
  register: redis_mount
  changed_when: false

- name: Display mount point
  debug:
    msg: "{{ redis_mount.stdout }}"

- name: Create Redis data directory
  file:
    path: /data/redis/6379
    state: directory
    mode: '0750'

- name: Check /data mount
  command: findmnt /data
  register: data_mount
  changed_when: false
  failed_when: false

- name: Display /data mount
  debug:
    msg: "{{ data_mount.stdout }}"

- name: Create test file
  file:
    path: /data/.rw-test
    state: touch

- name: Remove test file
  file:
    path: /data/.rw-test
    state: absent

- name: Check /data filesystem
  command: df -h /data
  register: data_df
  changed_when: false

- name: Display /data filesystem
  debug:
    msg: "{{ data_df.stdout }}"

- name: Set ownership for Redis data directory
  file:
    path: /data/redis
    owner: redis
    group: redis
    recurse: true

- name: Test Redis write permission
  shell: |
    sudo -u redis touch /data/redis/{{ redis_client_port }}/.rw-test
    rm -f /data/redis/{{ redis_client_port }}/.rw-test
  changed_when: false

- name: Backup redis.conf
  command: cp /etc/redis/redis.conf /etc/redis/redis.conf.bak

- name: Config redis.conf
  template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    owner: root
    group: root
    mode: '0644'
    backup: true

- name: Create ACL file
  template:
    src: users.acl.j2
    dest: /etc/redis/users.acl
    owner: redis
    group: redis
    mode: '0640'
    backup: true

- name: Create systemd override directory for Redis
  file:
    path: /etc/systemd/system/redis-server.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create override.conf
  template:
    src: override.conf.j2
    dest: /etc/systemd/system/redis-server.service.d/override.conf
    backup: true
  notify: reload systemd

- name: Ensure Redis data directory ownership
  file:
    path: /data/redis
    state: directory
    owner: redis
    group: redis
    recurse: yes

- name: Create tmpfiles.d config for Redis PID dir
  copy:
    content: "d /run/redis 0755 redis redis -\n"
    dest: /etc/tmpfiles.d/redis.conf
    owner: root
    group: root
    mode: '0644'

- name: Apply tmpfiles.d config
  command: systemd-tmpfiles --create /etc/tmpfiles.d/redis.conf
  changed_when: false

- name: Enable Redis service
  systemd:
    name: redis-server
    enabled: true
    state: started
  failed_when: false

- name: Restart Redis service
  systemd:
    name: redis-server
    state: started
  failed_when: false

- name: Status Redis service
  command: systemctl status redis-server
  register: redis_status
  changed_when: false
  failed_when: false

- name: Display Redis status
  debug:
    msg: "{{ redis_status.stdout }}"

- name: Check port redis
  command: ss -ltnp | grep -E '{{ redis_client_port }}|{{ redis_cluster_port }}'
  register: redis_port
  changed_when: false
  failed_when: false

- name: Display port redis
  debug:
    msg: "{{ redis_port.stdout }}"

- name: Check and confirm connect to redis from user admin
  command: redis-cli --user admin -a '{{ redis_admin_password }}' ping
  register: redis_ping_admin
  changed_when: false
  failed_when: false

- name: Display result
  debug:
    msg: "{{ redis_ping_admin.stdout }}"

- name: Check and confirm connect to redis from user admin
  command: redis-cli --user admin -a '{{ redis_admin_password }}' -c -h {{ ansible_host }} -p {{ redis_client_port }} cluster nodes
  register: redis_cluster_nodes
  changed_when: false
  failed_when: false

- name: Display result
  debug:
    msg: "{{ redis_cluster_nodes.stdout }}"

- name: Check dir
  command: redis-cli --user admin -a '{{ redis_admin_password }}' config get dir
  register: redis_dir
  changed_when: false
  failed_when: false

- name: Display result
  debug:
    msg: "{{ redis_dir.stdout }}"

- name: Stop Redis service
  systemd:
    name: redis-server
    state: stopped
  tags: reset_cluster

- name: Remove nodes-6379.conf
  file:
    path: /data/redis/6379/nodes-6379.conf
    state: absent
  tags: reset_cluster

- name: Remove appendonlydir
  shell: rm -rf /data/redis/6379/appendonlydir/*
  changed_when: false
  failed_when: false
  tags: reset_cluster

- name: Remove dump.rdb
  file:
    path: /data/redis/6379/dump.rdb
    state: absent
  tags: reset_cluster

- name: Enable Redis service
  systemd:
    name: redis-server
    state: started
  failed_when: false
  tags: reset_cluster

- name: Check cluster already exists
  command: redis-cli --user admin -a '{{ redis_admin_password }}' -h {{ hostvars[groups["redis"][0]]["ansible_host"] }} -p {{ redis_client_port }} cluster info
  run_once: true
  delegate_to: "{{ groups['redis'][0] }}"
  register: redis_cluster_exists
  changed_when: false
  failed_when: false
  tags: init_cluster

- name: Debug cluster exists stdout
  debug:
    msg: "stdout: '{{ redis_cluster_exists.stdout }}'"
  run_once: true
  tags: init_cluster

- name: Debug cluster exists stdout
  debug:
    msg: "{{ redis_cluster_exists.stdout }}"
  run_once: true
  tags: init_cluster

- name: Create Redis cluster
  command: >
    redis-cli --user admin -a '{{ redis_admin_password }}'
    --cluster create
    {% for host in groups['redis'] %}{{ hostvars[host]['ansible_host'] }}:{{ redis_client_port }} {% endfor %}
    --cluster-replicas 1
    --cluster-yes
  run_once: true
  delegate_to: "{{ groups['redis'][0] }}"
  tags: init_cluster
  when: >
    'cluster_state:ok' not in redis_cluster_exists.stdout and
    'cluster_known_nodes:6' not in redis_cluster_exists.stdout

- name: Check cluster info
  command: redis-cli --user admin -a '{{ redis_admin_password }}' -c -h {{ hostvars[groups["redis"][0]]["ansible_host"] }} -p {{ redis_client_port }} cluster info
  run_once: true
  delegate_to: "{{ groups['redis'][0] }}"
  register: redis_cluster_info
  changed_when: false
  failed_when: false

- name: Display result
  debug:
    msg: "{{ redis_cluster_info.stdout }}"

- name: Check cluster nodes
  command: redis-cli --user admin -a '{{ redis_admin_password }}' -c -h {{ hostvars[groups["redis"][0]]["ansible_host"] }} -p {{ redis_client_port }} cluster nodes
  run_once: true
  delegate_to: "{{ groups['redis'][0] }}"
  register: redis_cluster_nodes
  changed_when: false
  failed_when: false

- name: Display result
  debug:
    msg: "{{ redis_cluster_nodes.stdout }}"

- name: Check cluster state
  command: redis-cli --user admin -a '{{ redis_admin_password }}' --cluster check {{ hostvars[groups["redis"][0]]["ansible_host"] }}:{{ redis_client_port }}
  run_once: true
  delegate_to: "{{ groups['redis'][0] }}"
  register: redis_cluster_check
  changed_when: false
  failed_when: false

- name: Display result
  debug:
    msg: "{{ redis_cluster_check.stdout }}"

- name: Test write
  command: redis-cli --user admin -a '{{ redis_admin_password }}' -c -h {{ hostvars[groups["redis"][0]]["ansible_host"] }} -p {{ redis_client_port }} set test:key1 hello
  run_once: true
  delegate_to: "{{ groups['redis'][0] }}"
  register: redis_write
  changed_when: false

- name: Display write result
  debug:
    msg: "{{ redis_write.stdout }}"

- name: Test read
  command: redis-cli --user admin -a '{{ redis_admin_password }}' -c -h {{ hostvars[groups["redis"][0]]["ansible_host"] }} -p {{ redis_client_port }} get test:key1
  run_once: true
  delegate_to: "{{ groups['redis'][0] }}"
  register: redis_read
  changed_when: false

- name: Display read result
  debug:
    msg: "{{ redis_read.stdout }}"

- name: Check replication
  command: redis-cli --user admin -a '{{ redis_admin_password }}' -c -h {{ hostvars[groups["redis"][0]]["ansible_host"] }} -p {{ redis_client_port }} cluster nodes
  run_once: true
  delegate_to: "{{ groups['redis'][0] }}"
  register: redis_replication
  changed_when: false

- name: Display replication result
  debug:
    msg: "{{ redis_replication.stdout }}"